# Registry of this node's "needs" (requests-for-pile) — the searches it deposits.
# This workspace runs Atlas's matchmaker (.github/workflows/match.yml ->
# ./.atlas-engine/.github/actions/match) over these against its own piles/tells, publishing
# /matches.json. Schema mirrors the atlas engine's _data/needs.yml:
#   id, asker_repo, scope, topic, terms (EMPTY => match needs the asker's consent),
#   need_url (link to the asker's needs/<id>.json),
#   constitution (URL to the asker's live CONSTITUTION.md — travels with the need onto a peer
#     Atlas's bill so the answering judge can read it; see the atlas engine's CONTRACT.md
#     "Requested search from a peer". Optional for local matching, required for a need a friend
#     should find.)
# Seed entry below is illustrative of the shape; replace with the node's real needs.
- id: fc-repair-cafe
  asker_repo: FCCN-ANTIBODY/civic-node
  scope: "colorado"
  topic: "civic/mutual-aid"
  terms: ""
  need_url: https://github.com/FCCN-ANTIBODY/civic-node/blob/main/needs/fc-repair-cafe.json
  constitution: https://github.com/FCCN-ANTIBODY/civic-node/blob/main/CONSTITUTION.md
